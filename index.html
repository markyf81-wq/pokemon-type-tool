<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokemon Type Lookup</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #18202f;
      background: #f6f8fb;
      background: radial-gradient(circle at top left, rgba(239, 68, 68, 0.16), transparent 32rem), radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.14), transparent 34rem), #f6f8fb;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 16px;
    }

    h2,
    p {
      margin: 0;
    }

    .app {
      display: block;
      display: grid;
      grid-template-columns: minmax(260px, 360px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .app::after {
      content: "";
      display: table;
      clear: both;
    }

    .type-picker {
      float: left;
      width: 32%;
    }

    .results {
      float: right;
      width: 66%;
    }

    .app > * + * {
      margin-top: 18px;
    }

    @supports (display: grid) {
      .type-picker,
      .results {
        float: none;
        width: auto;
      }

      .pokemon-result .pokemon-name,
      .pokemon-result .pokemon-types {
        display: block;
        width: auto;
      }

      .app > * + * {
        margin-top: 0;
      }
    }

    .type-picker,
    .results {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(30, 41, 59, 0.12);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    .type-picker {
      display: grid;
      gap: 18px;
      padding: 16px;
      position: sticky;
      top: 16px;
    }

    .result-header h2 {
      font-size: 1rem;
      line-height: 1.2;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 4px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #eef2f7;
    }

    .tabs .tab {
      margin: 3px;
    }

    .tab {
      flex: 1 1 30%;
      min-height: 40px;
      border-color: transparent;
      background: transparent;
      color: #657186;
      font-weight: 800;
    }

    .tab:hover {
      transform: none;
      box-shadow: none;
      color: #18202f;
    }

    .tab.active {
      border-color: #dbe2ed;
      background: #fff;
      color: #18202f;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
    }

    .tab-panel[hidden] {
      display: none;
    }

    .search-box {
      width: 100%;
      min-height: 42px;
      margin-bottom: 10px;
      padding: 0 12px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      color: #18202f;
      font: 700 0.92rem/1 system-ui, sans-serif;
    }

    .search-box:focus {
      border-color: #2563eb;
      outline: 3px solid rgba(37, 99, 235, 0.2);
    }

    .pokemon-list {
      display: grid;
      gap: 7px;
      max-height: 430px;
      overflow: auto;
      padding-right: 3px;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .pagination button {
      min-height: 34px;
      padding: 0 12px;
      background: #18202f;
      color: #fff;
    }

    .pagination button[disabled] {
      cursor: default;
      opacity: 0.38;
    }

    .pagination-status {
      color: #657186;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .pokemon-result {
      margin-bottom: 7px;
    }

    .pokemon-result {
      width: 100%;
      table-layout: fixed;
      display: table;
      display: flex;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 46px;
      padding: 8px 10px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      color: #18202f;
      text-align: left;
      box-shadow: none;
    }

    .pokemon-result .pokemon-name {
      display: table-cell;
      vertical-align: middle;
      flex: 1 1 auto;
    }

    .pokemon-result .pokemon-types {
      display: table-cell;
      vertical-align: middle;
      text-align: right;
      flex: 0 0 auto;
    }

    .pokemon-result:hover {
      transform: none;
      border-color: #b7c2d2;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
    }

    .pokemon-result.active {
      border-color: #111827;
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.16);
    }

    .pokemon-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .pokemon-types {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 5px;
    }

    .pokemon-types .mini-chip {
      margin: 2px;
    }

    .mini-chip {
      min-height: 22px;
      padding: 0 8px;
      font-size: 0.68rem;
    }

    .type-grid {
      display: flex;
      flex-wrap: wrap;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .type-grid button {
      flex: 1 1 44%;
      margin: 4px;
    }

    button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: #fff;
      font: 750 0.88rem/1 system-ui, sans-serif;
      letter-spacing: 0;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.14);
    }

    button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.32);
      outline-offset: 2px;
    }

    button.active {
      border-color: #111827;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.72), 0 10px 20px rgba(15, 23, 42, 0.2);
    }

    .results {
      min-height: 480px;
      padding: 18px;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid #dbe2ed;
    }

    .result-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .result-summary > * + * {
      margin-left: 12px;
    }

    .pokemon-image {
      width: 112px;
      height: 112px;
      object-fit: contain;
      image-rendering: auto;
      flex: 0 0 auto;
    }

    .pokemon-image[hidden] {
      display: none;
    }

    .selected-type {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      color: #fff;
      font-weight: 800;
      font-size: 0.9rem;
    }

    .selected-type.multi-type {
      padding: 0;
      background: transparent !important;
    }

    .selected-type.multi-type .chip {
      margin: 0 0 0 6px;
    }

    .empty-badge {
      background: #8f99a5;
    }

    .pokemon-detail {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
    }

    .pokemon-detail[hidden] {
      display: none;
    }

    .pokemon-detail h3 {
      margin: 0 0 8px;
      font-size: 0.92rem;
      line-height: 1.25;
    }

    .pokemon-detail p {
      margin: 0;
      color: #657186;
      font-size: 0.86rem;
      line-height: 1.45;
      white-space: pre-line;
    }

    .pokemon-detail p + h3 {
      margin-top: 12px;
    }

    .matchups {
      display: flex;
      flex-wrap: wrap;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .group {
      flex: 1 1 280px;
      margin: 7px;
      min-height: 162px;
      padding: 14px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
    }

    .group h3 {
      margin: 0 0 10px;
      font-size: 0.92rem;
      line-height: 1.25;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border: 2px solid transparent;
      border-radius: 999px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 800;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.24);
      margin: 3px;
    }

    .chip-label {
      position: relative;
      z-index: 1;
    }

    .chip-super {
      border-color: #fff !important;
      border-color: #fff !important;
    }

    .chip-weak {
      border-color: #fff !important;
      border-style: dashed;
    }

    .chip-normal {
      border-color: transparent !important;
    }

    .chip-none {
      border-color: transparent !important;
      overflow: hidden;
      background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.7) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.7) 75%);
      background-size: 2px 2px;
    }

    .empty {
      color: #657186;
      font-size: 0.88rem;
    }

    footer {
      margin-top: 18px;
      color: #657186;
      font-size: 0.82rem;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 22px, 640px);
        padding: 24px 0;
      }

      .app,
      .matchups {
        grid-template-columns: 1fr;
      }

      .type-picker,
      .results {
        float: none;
        width: auto;
      }

      .type-picker {
        position: static;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="app" aria-label="Pokemon type matchup lookup">
      <aside class="type-picker" aria-label="Type lookup controls">
        <div class="tabs" role="tablist" aria-label="Lookup mode">
          <button class="tab active" type="button" id="pokemonTab" role="tab" aria-selected="true" aria-controls="pokemonPanel" data-tab="pokemon">
            Pokemon type
          </button>
          <button class="tab" type="button" id="attackTab" role="tab" aria-selected="false" aria-controls="attackPanel" data-tab="attack">
            Attack moves
          </button>
          <button class="tab" type="button" id="searchTab" role="tab" aria-selected="false" aria-controls="searchPanel" data-tab="search">
            Search pokemon
          </button>
        </div>

        <div class="tab-panel" id="pokemonPanel" role="tabpanel" aria-labelledby="pokemonTab">
          <div class="type-grid" id="pokemonButtons"></div>
        </div>

        <div class="tab-panel" id="searchPanel" role="tabpanel" aria-labelledby="searchTab" hidden>
          <input class="search-box" id="pokemonSearch" type="search" autocomplete="off" placeholder="Search Pokemon">
          <div class="pokemon-list" id="pokemonResults"></div>
          <div class="pagination" id="pokemonPagination">
            <button type="button" id="prevPokemonPage">Prev</button>
            <span class="pagination-status" id="pokemonPageStatus"></span>
            <button type="button" id="nextPokemonPage">Next</button>
          </div>
        </div>

        <div class="tab-panel" id="attackPanel" role="tabpanel" aria-labelledby="attackTab" hidden>
          <div class="type-grid" id="attackButtons"></div>
        </div>
      </aside>

      <section class="results" aria-live="polite">
        <div class="result-header">
          <div class="result-summary">
            <img class="pokemon-image" id="pokemonImage" alt="" hidden>
            <h2 id="resultTitle">Select a type</h2>
          </div>
          <span class="selected-type empty-badge" id="selectedBadge">None</span>
        </div>
        <div class="matchups" id="matchups"></div>
        <div class="pokemon-detail" id="pokemonDetail" hidden></div>
      </section>
    </section>

  </main>

var labelSets = {
  attack: [{
    key: "super",
    title: "Strong against",
    test: function test(value) {
      return value === 2;
    }
  }, {
    key: "weak",
    title: "Weak against",
    test: function test(value) {
      return value === .5;
    }
  }, {
    key: "normal",
    title: "Normal",
    test: function test(value) {
      return value === 1;
    }
  }, {
    key: "none",
    title: "Doesn't affect",
    test: function test(value) {
      return value === 0;
    }
  }],
  pokemon: [{
    key: "super",
    title: "Strong moves",
    test: function test(value) {
      return value === 2;
    }
  }, {
    key: "weak",
    title: "Weak move types",
    test: function test(value) {
      return value === .5;
    }
  }, {
    key: "normal",
    title: "Normal damage moves",
    test: function test(value) {
      return value === 1;
    }
  }, {
    key: "none",
    title: "No effect moves",
    test: function test(value) {
      return value === 0;
    }
  }]
};
var attackButtons = document.querySelector("#attackButtons");
var pokemonButtons = document.querySelector("#pokemonButtons");
var pokemonSearch = document.querySelector("#pokemonSearch");
var pokemonResults = document.querySelector("#pokemonResults");
var pokemonPagination = document.querySelector("#pokemonPagination");
var prevPokemonPage = document.querySelector("#prevPokemonPage");
var nextPokemonPage = document.querySelector("#nextPokemonPage");
var pokemonPageStatus = document.querySelector("#pokemonPageStatus");
var matchups = document.querySelector("#matchups");
var resultTitle = document.querySelector("#resultTitle");
var selectedBadge = document.querySelector("#selectedBadge");
var pokemonImage = document.querySelector("#pokemonImage");
var pokemonDetail = document.querySelector("#pokemonDetail");
var selections = {
  attack: "",
  pokemon: "",
  search: null
};
var searchPage = 1;
var searchPageSize = 20;
var activeMode = "pokemon";
function effectClass(value) {
  if (value > 1) return "chip-super";
  if (value > 0 && value < 1) return "chip-weak";
  if (value === 0) return "chip-none";
  return "chip-normal";
}
function typeChip(type) {
  var suffix = arguments.length > 1 && arguments[1] !== undefined ? arguments[1] : "";
  var value = arguments.length > 2 && arguments[2] !== undefined ? arguments[2] : 1;
  var color = colors[type];
  var borderColor = color;
  var shadow = "";
  if (value > 1) {
    borderColor = "#fff";
    shadow = " box-shadow:0 0 0 2px " + color + ", 0 4px 10px rgba(15, 23, 42, 0.18);";
  } else if (value > 0 && value < 1) {
    borderColor = "#fff";
  } else if (value === 0 || value === 1) {
    borderColor = "transparent";
  }
  return "<span class=\"chip ".concat(effectClass(value), "\" style=\"background-color:").concat(color, "; border-color:").concat(borderColor, ";").concat(shadow, "\"><span class=\"chip-label\">").concat(type).concat(suffix, "</span></span>");
}
function multiplierLabel(value) {
  var showAll = arguments.length > 1 && arguments[1] !== undefined ? arguments[1] : false;
  if (value === 4) return " x4";
  if (value === 2) return " x2";
  if (value === 1 && showAll) return " x1";
  if (value === .5) return " x0.5";
  if (value === .25) return " x0.25";
  if (value === 0) return " x0";
  return "";
}
function miniTypeChip(type) {
  return "<span class=\"chip mini-chip\" style=\"background:".concat(colors[type], "\">").concat(type, "</span>");
}
function buttonMarkup(mode) {
  return types.map(function (type) {
    return "\n        <button type=\"button\" style=\"background:".concat(colors[type], "\" data-mode=\"").concat(mode, "\" data-type=\"").concat(type, "\" aria-pressed=\"false\">\n          ").concat(type, "\n        </button>\n      ");
  }).join("");
}
function getMatchupValues(mode, type) {
  if (mode === "attack") {
    return chart[type].map(function (value, index) {
      return {
        type: types[index],
        value: value
      };
    });
  }
  var defendingIndex = types.indexOf(type);
  return types.map(function (attackType) {
    return {
      type: attackType,
      value: chart[attackType][defendingIndex]
    };
  });
}
function getPokemonMatchupValues(defendingTypes) {
  var defendingIndexes = defendingTypes.map(function (type) {
    return types.indexOf(type);
  });
  return types.map(function (attackType) {
    var value = defendingIndexes.reduce(function (total, defendingIndex) {
      return total * chart[attackType][defendingIndex];
    }, 1);
    return {
      type: attackType,
      value: value
    };
  });
}
function setActiveMode(mode) {
  activeMode = mode;
  document.querySelectorAll(".tab").forEach(function (tab) {
    var isActive = tab.dataset.tab === mode;
    tab.classList.toggle("active", isActive);
    tab.setAttribute("aria-selected", isActive);
  });
  document.querySelectorAll(".tab-panel").forEach(function (panel) {
    panel.hidden = panel.id !== "".concat(mode, "Panel");
  });
}
function renderEmpty(mode) {
  setActiveMode(mode);
  resultTitle.textContent = "Select a type";
  selectedBadge.textContent = "None";
  selectedBadge.removeAttribute("style");
  selectedBadge.classList.add("empty-badge");
  selectedBadge.classList.remove("multi-type");
  pokemonImage.hidden = true;
  pokemonImage.removeAttribute("src");
  pokemonImage.removeAttribute("alt");
  pokemonDetail.hidden = true;
  pokemonDetail.innerHTML = "";
  matchups.innerHTML = "";
  document.querySelectorAll(".type-grid button, .pokemon-result").forEach(function (button) {
    button.classList.remove("active");
    button.setAttribute("aria-pressed", "false");
  });
}
function renderGroups(mode, type) {
  selections[mode] = type;
  if (!type) {
    renderEmpty(mode);
    return;
  }
  setActiveMode(mode);
  var values = getMatchupValues(mode, type);
  var title = mode === "attack" ? "".concat(type, " attack move matchups") : "Moves against ".concat(type, " Pokemon");
  resultTitle.textContent = title;
  selectedBadge.textContent = type;
  selectedBadge.style.background = colors[type];
  selectedBadge.classList.remove("empty-badge");
  selectedBadge.classList.remove("multi-type");
  pokemonImage.hidden = true;
  pokemonImage.removeAttribute("src");
  pokemonImage.removeAttribute("alt");
  pokemonDetail.hidden = true;
  pokemonDetail.innerHTML = "";
  matchups.innerHTML = labelSets[mode].map(function (group) {
    var matches = values.filter(function (matchup) {
      return group.test(matchup.value);
    });
    var content = matches.length ? matches.map(function (matchup) {
      return typeChip(matchup.type, multiplierLabel(matchup.value), matchup.value);
    }).join("") : '<span class="empty">None</span>';
    return "\n          <article class=\"group\">\n            <h3>".concat(group.title, "</h3>\n            <div class=\"chips\">").concat(content, "</div>\n          </article>\n        ");
  }).join("");
  document.querySelectorAll(".type-grid button").forEach(function (button) {
    var isActive = button.dataset.mode === mode && button.dataset.type === type;
    button.classList.toggle("active", isActive);
    button.setAttribute("aria-pressed", isActive);
  });
}
function renderPokemon(pokemonEntry) {
  selections.search = pokemonEntry;
  setActiveMode("search");
  resultTitle.textContent = "Moves against ".concat(pokemonEntry.name);
  selectedBadge.innerHTML = pokemonEntry.types.map(miniTypeChip).join("");
  selectedBadge.removeAttribute("style");
  selectedBadge.classList.remove("empty-badge");
  selectedBadge.classList.add("multi-type");
  pokemonImage.src = pokemonEntry.img;
  pokemonImage.alt = pokemonEntry.name;
  pokemonImage.hidden = !pokemonEntry.img;
  var detail = "";
  if (pokemonEntry.locations && pokemonEntry.locations.length) {
    detail += "<h3>How to obtain in Emerald</h3><p>" + pokemonEntry.locations.join("\\n\\n") + "</p>";
  }
  if (pokemonEntry.notes && pokemonEntry.notes.length) {
    detail += "<h3>Notes</h3><p>" + pokemonEntry.notes.join("\\n\\n") + "</p>";
  }
  pokemonDetail.innerHTML = detail;
  pokemonDetail.hidden = !detail;
  var pokemonLabels = [{
    title: "Strong moves against",
    test: function test(value) {
      return value > 1;
    }
  }, {
    title: "Weak moves against",
    test: function test(value) {
      return value > 0 && value < 1;
    }
  }, {
    title: "Normal moves against",
    test: function test(value) {
      return value === 1;
    }
  }, {
    title: "No effect moves against",
    test: function test(value) {
      return value === 0;
    }
  }];
  var values = getPokemonMatchupValues(pokemonEntry.types);
  matchups.innerHTML = pokemonLabels.map(function (group) {
    var matches = values.filter(function (matchup) {
      return group.test(matchup.value);
    });
    var content = matches.length ? matches.map(function (matchup) {
      return typeChip(matchup.type, multiplierLabel(matchup.value, true), matchup.value);
    }).join("") : '<span class="empty">None</span>';
    return "\n          <article class=\"group\">\n            <h3>".concat(group.title, "</h3>\n            <div class=\"chips\">").concat(content, "</div>\n          </article>\n        ");
  }).join("");
  document.querySelectorAll(".pokemon-result").forEach(function (button) {
    var isActive = Number(button.dataset.index) === pokemon.indexOf(pokemonEntry);
    button.classList.toggle("active", isActive);
    button.setAttribute("aria-pressed", isActive);
  });
  document.querySelectorAll(".type-grid button").forEach(function (button) {
    button.classList.remove("active");
    button.setAttribute("aria-pressed", "false");
  });
}
function renderPokemonResults() {
  var query = arguments.length > 0 && arguments[0] !== undefined ? arguments[0] : "";
  var normalized = query.trim().toLowerCase();
  var matches = pokemon.map(function (entry, index) {
    return {
      n: entry.n,
      name: entry.name,
      types: entry.types,
      img: entry.img,
      index: index
    };
  }).filter(function (entry) {
    return !normalized || entry.name.toLowerCase().includes(normalized);
  });
  var totalPages = Math.max(1, Math.ceil(matches.length / searchPageSize));
  if (searchPage > totalPages) searchPage = totalPages;
  if (searchPage < 1) searchPage = 1;
  var pageStart = (searchPage - 1) * searchPageSize;
  var pageMatches = matches.slice(pageStart, pageStart + searchPageSize);
  pokemonResults.innerHTML = pageMatches.map(function (entry) {
    return "\n        <button class=\"pokemon-result\" type=\"button\" data-index=\"".concat(entry.index, "\" aria-pressed=\"false\">\n          <span class=\"pokemon-name\">#").concat(String(entry.n).padStart(4, "0"), " ").concat(entry.name, "</span>\n          <span class=\"pokemon-types\">").concat(entry.types.map(miniTypeChip).join(""), "</span>\n        </button>\n      ");
  }).join("");
  pokemonPagination.hidden = matches.length <= searchPageSize;
  prevPokemonPage.disabled = searchPage <= 1;
  nextPokemonPage.disabled = searchPage >= totalPages;
  pokemonPageStatus.textContent = matches.length ? "Page " + searchPage + " of " + totalPages : "No results";
}
attackButtons.innerHTML = buttonMarkup("attack");
pokemonButtons.innerHTML = buttonMarkup("pokemon");
renderPokemonResults();
document.querySelector(".type-picker").addEventListener("click", function (event) {
  var tab = event.target.closest(".tab[data-tab]");
  if (tab) {
    var mode = tab.dataset.tab;
    if (mode === "search") {
      selections.search ? renderPokemon(selections.search) : renderEmpty("search");
    } else {
      renderGroups(mode, selections[mode]);
    }
    return;
  }
  var pokemonButton = event.target.closest(".pokemon-result[data-index]");
  if (pokemonButton) {
    renderPokemon(pokemon[Number(pokemonButton.dataset.index)]);
    return;
  }
  var button = event.target.closest("button[data-type]");
  if (button) renderGroups(button.dataset.mode, button.dataset.type);
});
pokemonSearch.addEventListener("input", function (event) {
  searchPage = 1;
  renderPokemonResults(event.target.value);
});
prevPokemonPage.addEventListener("click", function () {
  searchPage -= 1;
  renderPokemonResults(pokemonSearch.value);
});
nextPokemonPage.addEventListener("click", function () {
  searchPage += 1;
  renderPokemonResults(pokemonSearch.value);
});
pokemonImage.addEventListener("error", function () {
  if (pokemonImage.src.indexOf("/avif/") !== -1) {
    pokemonImage.src = pokemonImage.src.replace("/avif/", "/").replace(".avif", ".png");
  } else {
    pokemonImage.hidden = true;
  }
});
renderGroups("pokemon", "");
