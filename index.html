<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokemon Type Lookup</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: #18202f;
      background: #f6f8fb;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 16px;
    }

    h2,
    h3,
    p {
      margin: 0;
    }

    .app:after,
    .tabs:after,
    .type-grid:after,
    .matchups:after,
    .chips:after,
    .pokemon-types:after,
    .result-header:after,
    .pagination:after {
      content: "";
      display: table;
      clear: both;
    }

    .type-picker,
    .results {
      background: #fff;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      box-shadow: 0 14px 34px rgba(30, 41, 59, 0.12);
    }

    .type-picker {
      float: left;
      width: 36%;
      height: 640px;
      overflow: hidden;
      padding: 16px;
    }

    .results {
      float: right;
      width: 62%;
      height: 640px;
      overflow: hidden;
      padding: 18px;
    }

    .tabs {
      padding: 4px;
      margin-bottom: 18px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #eef2f7;
    }

    .tab {
      float: left;
      width: 23%;
      min-height: 40px;
      margin: 3px 1%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: #657186;
      font: 800 0.84rem/1.1 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      cursor: pointer;
    }

    .tab.active {
      border-color: #dbe2ed;
      background: #fff;
      color: #18202f;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
    }

    .tab-panel[hidden],
    .pokemon-image[hidden],
    .move-detail[hidden],
    .pokemon-detail[hidden] {
      display: none;
    }

    .type-grid button {
      float: left;
      width: 47%;
      min-height: 42px;
      margin: 4px 1.5%;
      border: 1px solid transparent;
      border-radius: 8px;
      color: #fff;
      font: 800 0.88rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      cursor: pointer;
    }

    button.active {
      border-color: #111827;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.72), 0 8px 16px rgba(15, 23, 42, 0.16);
    }

    .search-box {
      width: 100%;
      height: 48px;
      margin-bottom: 10px;
      padding: 0 12px;
      border: 2px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      color: #18202f;
      font: 800 1rem/48px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .search-box:focus {
      border-color: #111827;
      background: #fff8c7;
      outline: 4px solid #facc15;
    }

    .search-type-filter {
      width: 100%;
      height: 40px;
      margin-bottom: 10px;
      padding: 0 10px;
      border: 2px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      color: #18202f;
      font: 800 0.9rem/40px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    #searchPanel,
    #teamPanel {
      height: 532px;
    }

    .pokemon-list {
      max-height: 380px;
      overflow: auto;
      padding-right: 3px;
    }

    .pokemon-result {
      display: block;
      width: 100%;
      min-height: 58px;
      margin-bottom: 9px;
      padding: 12px 10px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      color: #18202f;
      box-shadow: 0 5px 12px rgba(30, 41, 59, 0.08);
      text-align: left;
      font: 800 1rem/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      white-space: normal;
      cursor: pointer;
    }

    .pokemon-result:after {
      content: "";
      display: table;
      clear: both;
    }

    .pokemon-result.active {
      border-color: #111827;
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.16);
    }

    .pokemon-name,
    .pokemon-types {
      min-height: 34px;
    }

    .pokemon-name {
      display: block;
      margin-right: 142px;
      padding-right: 10px;
      padding-top: 9px;
      line-height: 1.2;
      overflow: hidden;
    }

    .pokemon-result-image {
      float: left;
      width: 36px;
      height: 36px;
      margin-right: 8px;
      border: 1px solid #dbe2ed;
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 2px 5px rgba(30, 41, 59, 0.12);
    }

    .pokemon-types {
      display: block;
      float: right;
      width: 132px;
      text-align: right;
      line-height: 36px;
      white-space: normal;
    }

    .pokemon-types-inner {
      display: inline-block;
      text-align: right;
      line-height: 1;
      white-space: normal;
      vertical-align: middle;
    }

    .pagination {
      display: block;
      position: relative;
      width: 100%;
      height: 36px;
      margin-top: 10px;
    }

    .pagination button {
      width: 62px;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: #18202f;
      color: #fff;
      font: 800 0.82rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .pagination button[disabled] {
      cursor: default;
      opacity: 0.38;
    }

    #prevPokemonPage {
      float: left;
    }

    #nextPokemonPage {
      float: right;
    }

    .pagination-status {
      display: block;
      position: absolute;
      left: 68px;
      right: 68px;
      top: 0;
      padding: 0;
      color: #657186;
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 34px;
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
    }

    .team-box,
    .recommend-box {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 5px 12px rgba(30, 41, 59, 0.08);
    }

    #teamPanel .team-box {
      height: 100%;
      margin-top: 0;
    }

    .team-box h3,
    .recommend-box h3 {
      margin-bottom: 8px;
      font-size: 0.92rem;
      line-height: 1.2;
    }

    .recommend-box h3 + h3,
    .recommend-item + h3 {
      margin-top: 12px;
    }

    .team-list {
      max-height: 478px;
      min-height: 32px;
      overflow: auto;
      padding-right: 3px;
    }

    .team-member {
      display: block;
      margin: 3px;
      padding: 8px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #f8fafc;
      color: #18202f;
      font-size: 0.76rem;
      font-weight: 800;
      line-height: 1;
      vertical-align: middle;
    }

    .team-select {
      display: block;
      width: 100%;
      min-height: 48px;
      margin: 6px 0;
      padding: 5px 10px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      color: #18202f;
      text-align: left;
      font: 800 0.86rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      cursor: pointer;
    }

    .team-select:after {
      content: "";
      display: table;
      clear: both;
    }

    .team-select.active {
      border-color: #111827;
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.16);
    }

    .team-select-image {
      float: left;
      width: 36px;
      height: 36px;
      margin-right: 8px;
      border: 1px solid #dbe2ed;
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 2px 5px rgba(30, 41, 59, 0.12);
    }

    .team-select-text {
      display: block;
      padding-top: 10px;
      overflow: hidden;
      line-height: 1.15;
    }

    .team-member-name {
      display: block;
      margin-bottom: 6px;
    }

    .team-nickname {
      display: block;
      width: 100%;
      height: 32px;
      margin: 4px 0 8px;
      padding: 0 8px;
      border: 1px solid #dbe2ed;
      border-radius: 6px;
      background: #fff;
      color: #18202f;
      font: 800 0.82rem/32px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .team-level {
      width: 54px;
      height: 30px;
      padding: 0 4px;
      border: 1px solid #dbe2ed;
      border-radius: 6px;
      color: #18202f;
      font: 800 0.76rem/30px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .opponent-level {
      width: 58px;
      height: 34px;
      margin-top: 8px;
      padding: 0 5px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      color: #18202f;
      font: 800 0.82rem/34px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      vertical-align: top;
    }

    .level-step {
      display: inline-block;
      width: 30px;
      height: 30px;
      min-height: 30px;
      margin: 0 3px;
      padding: 0;
      border: 1px solid #dbe2ed;
      border-radius: 6px;
      background: #eef2f7;
      color: #18202f;
      font: 900 1rem/28px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      text-align: center;
      vertical-align: middle;
    }

    .selected-actions .level-step {
      height: 34px;
      min-height: 34px;
      margin-top: 8px;
      line-height: 32px;
      vertical-align: top;
    }

    .level-label {
      display: inline-block;
      margin-top: 8px;
      margin-right: 4px;
      color: #657186;
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 34px;
      vertical-align: top;
    }

    .team-move {
      display: block;
      width: 100%;
      height: 30px;
      margin-top: 4px;
      border: 1px solid #dbe2ed;
      border-radius: 6px;
      background: #fff;
      color: #18202f;
      font: 800 0.72rem/30px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .team-remove {
      display: inline-block;
      min-height: 34px;
      margin-top: 10px;
      padding: 0 12px;
      border: 1px solid #dc2626;
      border-radius: 8px;
      background: #fff;
      color: #dc2626;
      font: 800 0.82rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      cursor: pointer;
    }

    .add-team-button {
      display: block;
      min-height: 34px;
      margin-top: 10px;
      margin-left: 0;
      padding: 0 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: #18202f;
      color: #fff;
      font: 800 0.82rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      cursor: pointer;
    }

    .add-team-button[disabled] {
      opacity: 0.42;
    }

    .recommend-item {
      min-height: 58px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #e5e7eb;
      color: #657186;
      font-size: 0.84rem;
      font-weight: 800;
      line-height: 1.35;
    }

    .recommend-item:after {
      content: "";
      display: table;
      clear: both;
    }

    .recommend-image {
      float: left;
      width: 48px;
      height: 48px;
      margin-right: 10px;
      padding: 3px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.14);
      object-fit: contain;
    }

    .recommend-copy {
      display: block;
      margin-left: 62px;
    }

    .recommend-item:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .recommend-name {
      color: #18202f;
      font-size: 0.92rem;
    }

    .result-header {
      padding-bottom: 16px;
      border-bottom: 1px solid #dbe2ed;
    }

    .result-summary {
      float: left;
      max-width: 70%;
    }

    .result-header h2 {
      display: inline-block;
      vertical-align: middle;
      font-size: 1.25rem;
      line-height: 1.2;
    }

    .pokemon-image {
      display: block;
      float: right;
      clear: none;
      width: 136px;
      height: 136px;
      padding: 6px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.16);
      margin-top: 0;
      object-fit: contain;
    }

    .selected-chips {
      float: left;
      clear: left;
      min-height: 34px;
      margin-top: 10px;
      padding: 0;
      background: transparent;
    }

    .selected-actions {
      float: left;
      clear: left;
      min-height: 34px;
    }

    .matchups {
      margin-top: 16px;
    }

    .results-body {
      max-height: 430px;
      overflow: auto;
      padding-right: 3px;
    }

    .group {
      float: left;
      width: 47%;
      min-height: 162px;
      margin: 7px 1.5%;
      padding: 14px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 6px 14px rgba(30, 41, 59, 0.1);
    }

    .group h3 {
      margin-bottom: 10px;
      font-size: 1rem;
      line-height: 1.25;
    }

    .effect-icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      margin-right: 6px;
      vertical-align: -4px;
    }

    .chip {
      position: relative;
      display: inline-block;
      min-height: 30px;
      margin: 3px;
      padding: 7px 10px 0;
      border: 2px solid transparent;
      border-radius: 999px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.24);
      vertical-align: middle;
    }

    .mini-chip {
      min-height: 0;
      padding: 5px 8px 4px;
      font-size: 0.68rem;
      line-height: 1;
    }

    .chip-super {
      border-color: #fff !important;
    }

    .chip-weak {
      border-color: #fff !important;
      border-style: dashed;
    }

    .chip-normal {
      border-color: transparent !important;
    }

    .chip-none {
      border-color: transparent !important;
      background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.7) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.7) 75%);
      background-size: 2px 2px;
    }

    .move-detail,
    .pokemon-detail {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
    }

    .move-detail h3,
    .pokemon-detail h3 {
      margin-bottom: 8px;
      font-size: 0.92rem;
      line-height: 1.25;
    }

    .pokemon-detail p {
      margin: 0;
      color: #657186;
      font-size: 0.86rem;
      line-height: 1.45;
      white-space: pre-line;
    }

    .pokemon-detail p + h3 {
      margin-top: 12px;
    }

    .move-list {
      margin: 0;
    }

    .move-level {
      margin-top: 10px;
    }

    .move-level:first-child {
      margin-top: 0;
    }

    .move-level-label {
      display: block;
      margin-bottom: 4px;
      color: #657186;
      font-size: 0.78rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .move-chip {
      display: inline-block;
      min-height: 30px;
      margin: 3px;
      padding: 7px 9px 0;
      border: 2px solid #fff;
      border-radius: 8px;
      color: #fff;
      font-size: 0.76rem;
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.24);
      vertical-align: middle;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.16);
    }

    .move-type {
      font-size: 0.66rem;
      opacity: 0.9;
    }

    .empty {
      color: #657186;
      font-size: 0.88rem;
    }

    @media (max-width: 820px) {
      main {
        padding: 16px;
      }

      .type-picker,
      .results {
        float: none;
        width: auto;
      }

      .results {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="app" aria-label="Pokemon type matchup lookup">
      <aside class="type-picker" aria-label="Type lookup controls">
        <div class="tabs" role="tablist" aria-label="Lookup mode">
          <button class="tab active" type="button" id="searchTab" role="tab" aria-selected="true" aria-controls="searchPanel" data-tab="search">
            Search
          </button>
          <button class="tab" type="button" id="teamTab" role="tab" aria-selected="false" aria-controls="teamPanel" data-tab="team">
            My team
          </button>
          <button class="tab" type="button" id="pokemonTab" role="tab" aria-selected="false" aria-controls="pokemonPanel" data-tab="pokemon">
            Pokemon types
          </button>
          <button class="tab" type="button" id="attackTab" role="tab" aria-selected="false" aria-controls="attackPanel" data-tab="attack">
            Move types
          </button>
        </div>

        <div class="tab-panel" id="pokemonPanel" role="tabpanel" aria-labelledby="pokemonTab" hidden>
          <div class="type-grid" id="pokemonButtons"></div>
        </div>

        <div class="tab-panel" id="searchPanel" role="tabpanel" aria-labelledby="searchTab">
          <input class="search-box" id="pokemonSearch" type="search" autocomplete="off" placeholder="Search Pokemon">
          <select class="search-type-filter" id="pokemonTypeFilter" aria-label="Filter by type"></select>
          <div class="pokemon-list" id="pokemonResults"></div>
          <div class="pagination" id="pokemonPagination">
            <button type="button" id="prevPokemonPage">Prev</button>
            <span class="pagination-status" id="pokemonPageStatus"></span>
            <button type="button" id="nextPokemonPage">Next</button>
          </div>
        </div>

        <div class="tab-panel" id="teamPanel" role="tabpanel" aria-labelledby="teamTab" hidden>
          <div class="team-box">
            <h3>My team</h3>
            <div class="team-list" id="teamList"><span class="empty">Add up to 6 Pokemon</span></div>
          </div>
        </div>

        <div class="tab-panel" id="attackPanel" role="tabpanel" aria-labelledby="attackTab" hidden>
          <div class="type-grid" id="attackButtons"></div>
        </div>
      </aside>

      <section class="results" aria-live="polite">
        <div class="result-header">
          <div class="result-summary">
            <h2 id="resultTitle">Select a type</h2>
          </div>
          <img class="pokemon-image" id="pokemonImage" alt="" hidden>
          <span class="selected-chips" id="selectedBadge"><span class="chip chip-normal" style="background-color:#8f99a5; border-color:transparent"><span class="chip-label">None</span></span></span>
          <span class="selected-actions" id="selectedActions"></span>
        </div>
        <div class="results-body">
          <div class="recommend-box" id="recommendBox" hidden></div>
          <div class="matchups" id="matchups"></div>
          <div class="move-detail" id="moveDetail" hidden></div>
          <div class="pokemon-detail" id="pokemonDetail" hidden></div>
        </div>
      </section>
    </section>

  </main>

  <script>
if (!Element.prototype.matches) {
  Element.prototype.matches = Element.prototype.msMatchesSelector || Element.prototype.webkitMatchesSelector;
}
if (!Element.prototype.closest) {
  Element.prototype.closest = function (selector) {
    var node = this;
    while (node && node.nodeType === 1) {
      if (node.matches(selector)) return node;
      node = node.parentElement || node.parentNode;
    }
    return null;
  };
}
if (window.NodeList && !NodeList.prototype.forEach) {
  NodeList.prototype.forEach = Array.prototype.forEach;
}
if (!String.prototype.includes) {
  String.prototype.includes = function (search, start) {
    return this.indexOf(search, start || 0) !== -1;
  };
}
if (!String.prototype.padStart) {
  String.prototype.padStart = function (targetLength, padString) {
    var value = String(this);
    var target = targetLength >> 0;
    var pad = padString === undefined ? " " : String(padString);
    while (value.length < target) {
      value = pad + value;
    }
    return value.length > target ? value.slice(value.length - target) : value;
  };
}
var types = ["Normal", "Fighting", "Flying", "Poison", "Ground", "Rock", "Bug", "Ghost", "Steel", "Fire", "Water", "Grass", "Electric", "Psychic", "Ice", "Dragon", "Dark"];
var colors = {
  Normal: "#8f99a5",
  Fighting: "#c94242",
  Flying: "#6f91db",
  Poison: "#9b59b6",
  Ground: "#d09b45",
  Rock: "#a89152",
  Bug: "#8aa629",
  Ghost: "#6260a8",
  Steel: "#6f8f9f",
  Fire: "#ef6c35",
  Water: "#3d82d6",
  Grass: "#4eaa55",
  Electric: "#d9a820",
  Psychic: "#e85c8b",
  Ice: "#57aeb7",
  Dragon: "#5c6fd8",
  Dark: "#5f514b",
  "???": "#7b8491"
};
var chart = {
  Normal: [1, 1, 1, 1, 1, .5, 1, 0, .5, 1, 1, 1, 1, 1, 1, 1, 1],
  Fighting: [2, 1, .5, .5, 1, 2, .5, 0, 2, 1, 1, 1, 1, .5, 2, 1, 2],
  Flying: [1, 2, 1, 1, 1, .5, 2, 1, .5, 1, 1, 2, .5, 1, 1, 1, 1],

  var pageMatches = matches.slice(pageStart, pageStart + searchPageSize);
  pokemonResults.innerHTML = pageMatches.map(function (entry) {
    return "\n        <button class=\"pokemon-result\" type=\"button\" data-index=\"".concat(entry.index, "\" aria-pressed=\"false\">\n          <span class=\"pokemon-types\"><span class=\"pokemon-types-inner\">").concat(entry.types.map(miniTypeChip).join(""), "</span></span>\n          <img class=\"pokemon-result-image\" src=\"").concat(entry.img, "\" alt=\"\">\n          <span class=\"pokemon-name\">").concat(entry.name, "</span>\n        </button>\n      ");
  }).join("");
  pokemonPagination.hidden = matches.length <= searchPageSize;
  prevPokemonPage.disabled = searchPage <= 1;
  nextPokemonPage.disabled = searchPage >= totalPages;
  pokemonPageStatus.textContent = matches.length ? "Page " + searchPage + " of " + totalPages : "No results";
}
attackButtons.innerHTML = buttonMarkup("attack");
pokemonButtons.innerHTML = buttonMarkup("pokemon");
pokemonTypeFilter.innerHTML = '<option value="">All types</option>' + types.slice().sort().map(function (type) {
  return "<option value=\"".concat(type, "\">").concat(type, "</option>");
}).join("");
renderPokemonResults();
loadTeam();
renderTeam();
document.querySelector(".type-picker").addEventListener("click", function (event) {
  var tab = event.target.closest(".tab[data-tab]");
  if (tab) {
    var mode = tab.dataset.tab;
    if (mode === "search") {
      selections.search ? renderPokemon(selections.search) : renderEmpty("search");
    } else if (mode === "team") {
      renderTeamEditor();
    } else {
      renderGroups(mode, selections[mode]);
    }
    return;
  }
  var pokemonButton = event.target.closest(".pokemon-result[data-index]");
  if (pokemonButton) {
    var selectedPokemon = pokemon[Number(pokemonButton.dataset.index)];
    delete opponentLevels[selectedPokemon.name];
    renderPokemon(selectedPokemon);
    return;
  }
  var teamButton = event.target.closest(".team-select[data-team-index]");
  if (teamButton) {
    teamSelection = Number(teamButton.dataset.teamIndex);
    renderTeam();
    renderTeamEditor();
    return;
  }
  var button = event.target.closest("button[data-type]");
  if (button) renderGroups(button.dataset.mode, button.dataset.type);
});
document.querySelector(".results").addEventListener("click", function (event) {
  var removeButton = event.target.closest(".team-remove[data-team-index]");
  if (removeButton) {
    team.splice(Number(removeButton.dataset.teamIndex), 1);
    if (teamSelection >= team.length) teamSelection = Math.max(0, team.length - 1);
    saveTeam();
    renderTeam();
    renderTeamEditor();
    return;
  }
  var opponentStep = event.target.closest(".opponent-level-step[data-opponent-name]");
  if (opponentStep) {
    var opponentName = opponentStep.dataset.opponentName;
    var opponentCurrent = Number(opponentLevels[opponentName]) || 0;
    var opponentNext = Math.max(1, Math.min(100, opponentCurrent + Number(opponentStep.dataset.step)));
    opponentLevels[opponentName] = opponentNext;
    if (selections.search) renderPokemon(selections.search);
    return;
  }
  var teamStep = event.target.closest(".team-level-step[data-team-index]");
  if (teamStep) {
    var stepMember = team[Number(teamStep.dataset.teamIndex)];
    if (!stepMember) return;
    var teamCurrent = Number(stepMember.level) || 0;
    stepMember.level = Math.max(1, Math.min(100, teamCurrent + Number(teamStep.dataset.step)));
    cleanTeamMoves(stepMember);
    saveTeam();
    renderTeam();
    renderTeamEditor();
    return;
  }
  var addButton = event.target.closest(".add-team-button[data-team-index]");
  if (!addButton || addButton.disabled) return;
  var member = pokemon[Number(addButton.dataset.teamIndex)];
  if (team.length >= 6 || teamContains(member)) return;
  team.push({
    name: member.name,
    nickname: "",
    level: "",
    moves: [],
    fainted: false
  });
  teamSelection = team.length - 1;
  saveTeam();
  renderTeam();
  if (selections.search) renderPokemon(selections.search);
});
document.querySelector(".app").addEventListener("change", function (event) {
  var opponentInput = event.target.closest(".opponent-level[data-opponent-name]");
  if (opponentInput) {
    var opponentLevel = Number(opponentInput.value);
    if (opponentLevel) {
      opponentLevels[opponentInput.dataset.opponentName] = Math.max(1, Math.min(100, opponentLevel));
    } else {
      delete opponentLevels[opponentInput.dataset.opponentName];
    }
    if (selections.search) renderPokemon(selections.search);
    return;
  }
  var levelInput = event.target.closest(".team-level[data-team-index]");
  if (levelInput) {
    var member = team[Number(levelInput.dataset.teamIndex)];
    if (!member) return;
    var level = Number(levelInput.value);
    member.level = level ? Math.max(1, Math.min(100, level)) : "";
    cleanTeamMoves(member);
    saveTeam();
    renderTeam();
    if (activeMode === "team") renderTeamEditor();
    return;
  }
  var faintedInput = event.target.closest(".team-fainted[data-team-index]");
  if (faintedInput) {
    var faintedMember = team[Number(faintedInput.dataset.teamIndex)];
    if (!faintedMember) return;
    faintedMember.fainted = faintedInput.checked;
    saveTeam();
    renderTeam();
    if (activeMode === "team") renderTeamEditor();
    return;
  }
  var moveSelect = event.target.closest(".team-move[data-team-index]");
  if (moveSelect) {
    var moveMember = team[Number(moveSelect.dataset.teamIndex)];
    if (!moveMember) return;
    moveMember.moves[Number(moveSelect.dataset.moveSlot)] = moveSelect.value;
    saveTeam();
    renderTeam();
    if (activeMode === "team") renderTeamEditor();
  }
});
document.querySelector(".app").addEventListener("input", function (event) {
  var nicknameInput = event.target.closest(".team-nickname[data-team-index]");
  if (!nicknameInput) return;
  var nicknameMember = team[Number(nicknameInput.dataset.teamIndex)];
  if (!nicknameMember) return;
  nicknameMember.nickname = nicknameInput.value.replace(/^\s+|\s+$/g, "");
  saveTeam();
  renderTeam();
  if (selections.search) renderRecommendation(selections.search);
  resultTitle.textContent = teamDisplayName(nicknameMember);
});
pokemonSearch.addEventListener("input", function (event) {
  searchPage = 1;
  renderPokemonResults(event.target.value);
});
pokemonSearch.addEventListener("focus", function () {
  if (!pokemonSearch.value) return;
  pokemonSearch.value = "";
  searchPage = 1;
  renderPokemonResults("");
});
pokemonTypeFilter.addEventListener("change", function () {
  searchPage = 1;
  renderPokemonResults(pokemonSearch.value);
});
prevPokemonPage.addEventListener("click", function () {
  searchPage -= 1;
  renderPokemonResults(pokemonSearch.value);
});
nextPokemonPage.addEventListener("click", function () {
  searchPage += 1;
  renderPokemonResults(pokemonSearch.value);
});
pokemonImage.addEventListener("error", function () {
  pokemonImage.hidden = true;
});
renderEmpty("search");
  </script>
</body>
</html>
