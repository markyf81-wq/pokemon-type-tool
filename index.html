<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokemon Type Lookup</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: #18202f;
      background: #f6f8fb;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 16px;
    }

    h2,
    h3,
    p {
      margin: 0;
    }

    .app:after,
    .tabs:after,
    .type-grid:after,
    .matchups:after,
    .chips:after,
    .pokemon-types:after,
    .result-header:after,
    .pagination:after {
      content: "";
      display: table;
      clear: both;
    }

    .type-picker,
    .results {
      background: #fff;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      box-shadow: 0 14px 34px rgba(30, 41, 59, 0.12);
    }

    .type-picker {
      float: left;
      width: 32%;
      height: 640px;
      overflow: hidden;
      padding: 16px;
    }

    .results {
      float: right;
      width: 66%;
      height: 640px;
      overflow: hidden;
      padding: 18px;
    }

    .tabs {
      padding: 4px;
      margin-bottom: 18px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #eef2f7;
    }

    .tab {
      float: left;
      width: 31.333%;
      min-height: 40px;
      margin: 3px 1%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: #657186;
      font: 800 0.84rem/1.1 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      cursor: pointer;
    }

    .tab.active {
      border-color: #dbe2ed;
      background: #fff;
      color: #18202f;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
    }

    .tab-panel[hidden],
    .pokemon-image[hidden],
    .move-detail[hidden],
    .pokemon-detail[hidden] {
      display: none;
    }

    .type-grid button {
      float: left;
      width: 47%;
      min-height: 42px;
      margin: 4px 1.5%;
      border: 1px solid transparent;
      border-radius: 8px;
      color: #fff;
      font: 800 0.88rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      cursor: pointer;
    }

    button.active {
      border-color: #111827;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.72), 0 8px 16px rgba(15, 23, 42, 0.16);
    }

    .search-box {
      width: 100%;
      height: 48px;
      margin-bottom: 10px;
      padding: 0 12px;
      border: 2px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      color: #18202f;
      font: 800 1rem/48px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .search-box:focus {
      border-color: #111827;
      background: #fff8c7;
      outline: 4px solid #facc15;
    }

    .pokemon-list {
      max-height: 430px;
      overflow: auto;
      padding-right: 3px;
    }

    .pokemon-result {
      display: block;
      width: 100%;
      min-height: 58px;
      margin-bottom: 9px;
      padding: 12px 10px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      color: #18202f;
      box-shadow: 0 5px 12px rgba(30, 41, 59, 0.08);
      text-align: left;
      font: 800 1rem/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      white-space: normal;
      cursor: pointer;
    }

    .pokemon-result:after {
      content: "";
      display: table;
      clear: both;
    }

    .pokemon-result.active {
      border-color: #111827;
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.16);
    }

    .pokemon-name,
    .pokemon-types {
      min-height: 34px;
    }

    .pokemon-name {
      display: block;
      margin-right: 142px;
      padding-right: 10px;
      padding-top: 7px;
      line-height: 1.2;
    }

    .pokemon-types {
      display: block;
      float: right;
      width: 132px;
      text-align: right;
      line-height: 1;
      white-space: normal;
    }

    .pokemon-types-inner {
      display: block;
      text-align: right;
      white-space: normal;
    }

    .pagination {
      display: table;
      width: 100%;
      table-layout: fixed;
      margin-top: 10px;
    }

    .pagination button {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: #18202f;
      color: #fff;
      font: 800 0.82rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .pagination button[disabled] {
      cursor: default;
      opacity: 0.38;
    }

    #prevPokemonPage {
      float: left;
    }

    #nextPokemonPage {
      float: right;
    }

    .pagination-status {
      display: table-cell;
      width: auto;
      padding: 0 6px;
      color: #657186;
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 34px;
      text-align: center;
      vertical-align: middle;
    }

    .result-header {
      padding-bottom: 16px;
      border-bottom: 1px solid #dbe2ed;
    }

    .result-summary {
      float: left;
      max-width: 70%;
    }

    .result-header h2 {
      display: inline-block;
      vertical-align: middle;
      font-size: 1.25rem;
      line-height: 1.2;
    }

    .pokemon-image {
      display: block;
      float: right;
      clear: none;
      width: 136px;
      height: 136px;
      padding: 6px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.16);
      margin-top: 0;
      object-fit: contain;
    }

    .selected-chips {
      float: left;
      clear: left;
      min-height: 34px;
      margin-top: 10px;
      padding: 0;
      background: transparent;
    }

    .matchups {
      margin-top: 16px;
    }

    .results-body {
      max-height: 430px;
      overflow: auto;
      padding-right: 3px;
    }

    .group {
      float: left;
      width: 47%;
      min-height: 162px;
      margin: 7px 1.5%;
      padding: 14px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 6px 14px rgba(30, 41, 59, 0.1);
    }

    .group h3 {
      margin-bottom: 10px;
      font-size: 1rem;
      line-height: 1.25;
    }

    .effect-icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      margin-right: 6px;
      vertical-align: -4px;
    }

    .chip {
      position: relative;
      display: inline-block;
      min-height: 30px;
      margin: 3px;
      padding: 7px 10px 0;
      border: 2px solid transparent;
      border-radius: 999px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.24);
      vertical-align: middle;
    }

    .mini-chip {
      min-height: 0;
      padding: 5px 8px 4px;
      font-size: 0.68rem;
      line-height: 1;
    }

    .chip-super {
      border-color: #fff !important;
    }

    .chip-weak {
      border-color: #fff !important;
      border-style: dashed;
    }

    .chip-normal {
      border-color: transparent !important;
    }

    .chip-none {
      border-color: transparent !important;
      background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.7) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.7) 75%);
      background-size: 2px 2px;
    }

    .move-detail,
    .pokemon-detail {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid #dbe2ed;
      border-radius: 8px;
      background: #fff;
    }

    .move-detail h3,
    .pokemon-detail h3 {
      margin-bottom: 8px;
      font-size: 0.92rem;
      line-height: 1.25;
    }

    .pokemon-detail p {
      margin: 0;
      color: #657186;
      font-size: 0.86rem;
      line-height: 1.45;
      white-space: pre-line;
    }

    .pokemon-detail p + h3 {
      margin-top: 12px;
    }

    .move-list {
      margin: 0;
    }

    .move-level {
      margin-top: 10px;
    }

    .move-level:first-child {
      margin-top: 0;
    }

    .move-level-label {
      display: block;
      margin-bottom: 4px;
      color: #657186;
      font-size: 0.78rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .move-chip {
      display: inline-block;
      min-height: 30px;
      margin: 3px;
      padding: 7px 9px 0;
      border: 2px solid #fff;
      border-radius: 8px;
      color: #fff;
      font-size: 0.76rem;
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.24);
      vertical-align: middle;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.16);
    }

    .move-type {
      font-size: 0.66rem;
      opacity: 0.9;
    }

    .empty {
      color: #657186;
      font-size: 0.88rem;
    }

    @media (max-width: 820px) {
      main {
        padding: 16px;
      }

      .type-picker,
      .results {
        float: none;
        width: auto;
      }

      .results {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="app" aria-label="Pokemon type matchup lookup">
      <aside class="type-picker" aria-label="Type lookup controls">
        <div class="tabs" role="tablist" aria-label="Lookup mode">
          <button class="tab active" type="button" id="searchTab" role="tab" aria-selected="true" aria-controls="searchPanel" data-tab="search">
            Search
          </button>
          <button class="tab" type="button" id="pokemonTab" role="tab" aria-selected="false" aria-controls="pokemonPanel" data-tab="pokemon">
            Pokemon type
          </button>
          <button class="tab" type="button" id="attackTab" role="tab" aria-selected="false" aria-controls="attackPanel" data-tab="attack">
            Move type
          </button>
        </div>

        <div class="tab-panel" id="pokemonPanel" role="tabpanel" aria-labelledby="pokemonTab" hidden>
          <div class="type-grid" id="pokemonButtons"></div>
        </div>

        <div class="tab-panel" id="searchPanel" role="tabpanel" aria-labelledby="searchTab">
          <input class="search-box" id="pokemonSearch" type="search" autocomplete="off" placeholder="Search Pokemon">
          <div class="pokemon-list" id="pokemonResults"></div>
          <div class="pagination" id="pokemonPagination">
            <button type="button" id="prevPokemonPage">Prev</button>
            <span class="pagination-status" id="pokemonPageStatus"></span>
            <button type="button" id="nextPokemonPage">Next</button>
          </div>
        </div>

        <div class="tab-panel" id="attackPanel" role="tabpanel" aria-labelledby="attackTab" hidden>
          <div class="type-grid" id="attackButtons"></div>
        </div>
      </aside>

      <section class="results" aria-live="polite">
        <div class="result-header">
          <div class="result-summary">
            <h2 id="resultTitle">Select a type</h2>
          </div>
          <img class="pokemon-image" id="pokemonImage" alt="" hidden>
          <span class="selected-chips" id="selectedBadge"><span class="chip chip-normal" style="background-color:#8f99a5; border-color:transparent"><span class="chip-label">None</span></span></span>
        </div>
        <div class="results-body">
          <div class="matchups" id="matchups"></div>
          <div class="move-detail" id="moveDetail" hidden></div>
          <div class="pokemon-detail" id="pokemonDetail" hidden></div>
        </div>
      </section>
    </section>

  </main>

  } else if (value === 0 || value === 1) {
    borderColor = "transparent";
  }
  return "<span class=\"chip ".concat(effectClass(value), "\" style=\"background-color:").concat(color, "; border-color:").concat(borderColor, ";").concat(shadow, "\"><span class=\"chip-label\">").concat(type).concat(suffix, "</span></span>");
}
function multiplierLabel(value) {
  var showAll = arguments.length > 1 && arguments[1] !== undefined ? arguments[1] : false;
  if (value === 4) return " x4";
  if (value === 2) return " x2";
  if (value === 1 && showAll) return " x1";
  if (value === .5) return " x0.5";
  if (value === .25) return " x0.25";
  if (value === 0) return " x0";
  return "";
}
function miniTypeChip(type) {
  return "<span class=\"chip mini-chip\" style=\"background:".concat(colors[type], "\">").concat(type, "</span>");
}
function plainTypeChip(type) {
  return "<span class=\"chip chip-normal\" style=\"background-color:".concat(colors[type], "; border-color:transparent\"><span class=\"chip-label\">").concat(type, "</span></span>");
}
function moveChip(move) {
  var color = colors[move.type] || colors.Normal;
  return "<span class=\"move-chip\" style=\"background-color:".concat(color, "\">").concat(move.name, " - <span class=\"move-type\">[").concat(move.type, "]</span></span>");
}
function moveLevelRank(label) {
  if (label.indexOf("Lv ") === 0) return Number(label.replace("Lv ", ""));
  return 999;
}
function moveGroups(moves) {
  var groups = [];
  moves.forEach(function (move) {
    var label = move.levelLabel || "TM / Other";
    var group = null;
    groups.forEach(function (existing) {
      if (existing.label === label) group = existing;
    });
    if (!group) {
      group = {
        label: label,
        moves: []
      };
      groups.push(group);
    }
    group.moves.push(move);
  });
  groups.sort(function (a, b) {
    var rankDiff = moveLevelRank(a.label) - moveLevelRank(b.label);
    if (rankDiff) return rankDiff;
    return a.label.localeCompare(b.label);
  });
  return groups.map(function (group) {
    return "<div class=\"move-level\"><span class=\"move-level-label\">".concat(group.label, "</span>").concat(group.moves.map(moveChip).join(""), "</div>");
  }).join("");
}
function emptyChip() {
  return "<span class=\"chip chip-normal\" style=\"background-color:#8f99a5; border-color:transparent\"><span class=\"chip-label\">None</span></span>";
}
function effectIcon(name) {
  if (name === "strong") {
    return '<svg class="effect-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="#facc15" stroke="#111827" stroke-width="1.5" d="M12 2.8l2.7 5.5 6.1.9-4.4 4.3 1 6.1-5.4-2.9-5.4 2.9 1-6.1-4.4-4.3 6.1-.9z"/></svg>';
  }
  if (name === "weak") {
    return '<svg class="effect-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/><path d="M12 6v9" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round"/><path d="M8 12l4 4 4-4" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }
  if (name === "none") {
    return '<svg class="effect-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><path d="M8 8l8 8M16 8l-8 8" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/></svg>';
  }
  return '<svg class="effect-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><circle cx="12" cy="12" r="2.5" fill="#2563eb"/></svg>';
}
function groupTitle(group) {
  return effectIcon(group.icon) + group.title;
}
function buttonMarkup(mode) {
  return types.map(function (type) {
    return "\n        <button type=\"button\" style=\"background:".concat(colors[type], "\" data-mode=\"").concat(mode, "\" data-type=\"").concat(type, "\" aria-pressed=\"false\">\n          ").concat(type, "\n        </button>\n      ");
  }).join("");
}
function getMatchupValues(mode, type) {
  if (mode === "attack") {
    return chart[type].map(function (value, index) {
      return {
        type: types[index],
        value: value
      };
    });
  }
  var defendingIndex = types.indexOf(type);
  return types.map(function (attackType) {
    return {
      type: attackType,
      value: chart[attackType][defendingIndex]
    };
  });
}
function getPokemonMatchupValues(defendingTypes) {
  var defendingIndexes = defendingTypes.map(function (type) {
    return types.indexOf(type);
  });
  return types.map(function (attackType) {
    var value = defendingIndexes.reduce(function (total, defendingIndex) {
      return total * chart[attackType][defendingIndex];
    }, 1);
    return {
      type: attackType,
      value: value
    };
  });
}
function setActiveMode(mode) {
  activeMode = mode;
  document.querySelectorAll(".tab").forEach(function (tab) {
    var isActive = tab.dataset.tab === mode;
    tab.classList.toggle("active", isActive);
    tab.setAttribute("aria-selected", isActive);
  });
  document.querySelectorAll(".tab-panel").forEach(function (panel) {
    panel.hidden = panel.id !== "".concat(mode, "Panel");
  });
}
function renderEmpty(mode) {
  setActiveMode(mode);
  resultTitle.textContent = "Select a type";
  selectedBadge.innerHTML = emptyChip();
  selectedBadge.removeAttribute("style");
  selectedBadge.className = "selected-chips";
  pokemonImage.hidden = true;
  pokemonImage.removeAttribute("src");
  pokemonImage.removeAttribute("alt");
  moveDetail.hidden = true;
  moveDetail.innerHTML = "";
  pokemonDetail.hidden = true;
  pokemonDetail.innerHTML = "";
  matchups.innerHTML = "";
  document.querySelectorAll(".type-grid button, .pokemon-result").forEach(function (button) {
    button.classList.remove("active");
    button.setAttribute("aria-pressed", "false");
  });
}
function renderGroups(mode, type) {
  selections[mode] = type;
  if (!type) {
    renderEmpty(mode);
    return;
  }
  setActiveMode(mode);
  var values = getMatchupValues(mode, type);
  var title = mode === "attack" ? "".concat(type, " attack move matchups") : "Moves against ".concat(type, " Pokemon");
  resultTitle.textContent = title;
  selectedBadge.className = "selected-chips";
  selectedBadge.innerHTML = plainTypeChip(type);
  selectedBadge.removeAttribute("style");
  pokemonImage.hidden = true;
  pokemonImage.removeAttribute("src");
  pokemonImage.removeAttribute("alt");
  moveDetail.hidden = true;
  moveDetail.innerHTML = "";
  pokemonDetail.hidden = true;
  pokemonDetail.innerHTML = "";
  matchups.innerHTML = labelSets[mode].map(function (group) {
    var matches = values.filter(function (matchup) {
      return group.test(matchup.value);
    });
    var content = matches.length ? matches.map(function (matchup) {
      return typeChip(matchup.type, multiplierLabel(matchup.value), matchup.value);
    }).join("") : '<span class="empty">None</span>';
    return "\n          <article class=\"group\">\n            <h3>".concat(groupTitle(group), "</h3>\n            <div class=\"chips\">").concat(content, "</div>\n          </article>\n        ");
  }).join("");
  document.querySelectorAll(".type-grid button").forEach(function (button) {
    var isActive = button.dataset.mode === mode && button.dataset.type === type;
    button.classList.toggle("active", isActive);
    button.setAttribute("aria-pressed", isActive);
  });
}
function renderPokemon(pokemonEntry) {
  selections.search = pokemonEntry;
  setActiveMode("search");
  resultTitle.textContent = pokemonEntry.name;
  selectedBadge.innerHTML = pokemonEntry.types.map(plainTypeChip).join("");
  selectedBadge.removeAttribute("style");
  selectedBadge.className = "selected-chips";
  pokemonImage.src = pokemonEntry.img;
  pokemonImage.alt = pokemonEntry.name;
  pokemonImage.hidden = !pokemonEntry.img;
  var moves = "";
  if (pokemonEntry.moves && pokemonEntry.moves.length) {
    moves = "<h3>Moves to watch for</h3><div class=\"move-list\">" + moveGroups(pokemonEntry.moves) + "</div>";
  }
  moveDetail.innerHTML = moves;
  moveDetail.hidden = !moves;
  var detail = "";
  if (pokemonEntry.locations && pokemonEntry.locations.length) {
    detail += "<h3>Where to find it</h3><p>" + pokemonEntry.locations.join("\\n\\n") + "</p>";
  }
  if (pokemonEntry.notes && pokemonEntry.notes.length) {
    detail += "<h3>Notes</h3><p>" + pokemonEntry.notes.join("\\n\\n") + "</p>";
  }
  pokemonDetail.innerHTML = detail;
  pokemonDetail.hidden = !detail;
  var pokemonLabels = [{
    icon: "strong",
    title: "Use these moves",
    test: function test(value) {
      return value > 1;
    }
  }, {
    icon: "weak",
    title: "Not very good",
    test: function test(value) {
      return value > 0 && value < 1;
    }
  }, {
    icon: "normal",
    title: "Okay moves",
    test: function test(value) {
      return value === 1;
    }
  }, {
    icon: "none",
    title: "Won't work",
    test: function test(value) {
      return value === 0;
    }
  }];
  var values = getPokemonMatchupValues(pokemonEntry.types);
  matchups.innerHTML = pokemonLabels.map(function (group) {
    var matches = values.filter(function (matchup) {
      return group.test(matchup.value);
    });
    var content = matches.length ? matches.map(function (matchup) {
      return typeChip(matchup.type, multiplierLabel(matchup.value, true), matchup.value);
    }).join("") : '<span class="empty">None</span>';
    return "\n          <article class=\"group\">\n            <h3>".concat(groupTitle(group), "</h3>\n            <div class=\"chips\">").concat(content, "</div>\n          </article>\n        ");
  }).join("");
  document.querySelectorAll(".pokemon-result").forEach(function (button) {
    var isActive = Number(button.dataset.index) === pokemon.indexOf(pokemonEntry);
    button.classList.toggle("active", isActive);
    button.setAttribute("aria-pressed", isActive);
  });
  document.querySelectorAll(".type-grid button").forEach(function (button) {
    button.classList.remove("active");
    button.setAttribute("aria-pressed", "false");
  });
}
function renderPokemonResults() {
  var query = arguments.length > 0 && arguments[0] !== undefined ? arguments[0] : "";
  var normalized = query.trim().toLowerCase();
  var matches = pokemon.map(function (entry, index) {
    return {
      n: entry.n,
      name: entry.name,
      types: entry.types,
      img: entry.img,
      index: index
    };
  }).filter(function (entry) {
    return !normalized || entry.name.toLowerCase().includes(normalized);
  });
  var totalPages = Math.max(1, Math.ceil(matches.length / searchPageSize));
  if (searchPage > totalPages) searchPage = totalPages;
  if (searchPage < 1) searchPage = 1;
  var pageStart = (searchPage - 1) * searchPageSize;
  var pageMatches = matches.slice(pageStart, pageStart + searchPageSize);
  pokemonResults.innerHTML = pageMatches.map(function (entry) {
    return "\n        <button class=\"pokemon-result\" type=\"button\" data-index=\"".concat(entry.index, "\" aria-pressed=\"false\">\n          <span class=\"pokemon-types\"><span class=\"pokemon-types-inner\">").concat(entry.types.map(miniTypeChip).join(""), "</span></span>\n          <span class=\"pokemon-name\">").concat(entry.name, "</span>\n        </button>\n      ");
  }).join("");
  pokemonPagination.hidden = matches.length <= searchPageSize;
  prevPokemonPage.disabled = searchPage <= 1;
  nextPokemonPage.disabled = searchPage >= totalPages;
  pokemonPageStatus.textContent = matches.length ? "Page " + searchPage + " of " + totalPages : "No results";
}
attackButtons.innerHTML = buttonMarkup("attack");
pokemonButtons.innerHTML = buttonMarkup("pokemon");
renderPokemonResults();
document.querySelector(".type-picker").addEventListener("click", function (event) {
  var tab = event.target.closest(".tab[data-tab]");
  if (tab) {
    var mode = tab.dataset.tab;
    if (mode === "search") {
      selections.search ? renderPokemon(selections.search) : renderEmpty("search");
    } else {
      renderGroups(mode, selections[mode]);
    }
    return;
  }
  var pokemonButton = event.target.closest(".pokemon-result[data-index]");
  if (pokemonButton) {
    renderPokemon(pokemon[Number(pokemonButton.dataset.index)]);
    return;
  }
  var button = event.target.closest("button[data-type]");
  if (button) renderGroups(button.dataset.mode, button.dataset.type);
});
pokemonSearch.addEventListener("input", function (event) {
  searchPage = 1;
  renderPokemonResults(event.target.value);
});
pokemonSearch.addEventListener("focus", function () {
  if (!pokemonSearch.value) return;
  pokemonSearch.value = "";
  searchPage = 1;
  renderPokemonResults("");
});
prevPokemonPage.addEventListener("click", function () {
  searchPage -= 1;
  renderPokemonResults(pokemonSearch.value);
});
nextPokemonPage.addEventListener("click", function () {
  searchPage += 1;
  renderPokemonResults(pokemonSearch.value);
});
pokemonImage.addEventListener("error", function () {
  pokemonImage.hidden = true;
});
renderEmpty("search");
  </script>
</body>
</html>
