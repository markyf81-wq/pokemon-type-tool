<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokemon Type Lookup</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #18202f;
      --muted: #657186;
      --line: #dbe2ed;
      --focus: #2563eb;
      --shadow: 0 18px 50px rgba(30, 41, 59, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(239, 68, 68, 0.16), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.14), transparent 34rem),
        var(--bg);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0;
    }

    header {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    header p {
      max-width: 720px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(260px, 360px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .type-picker,
    .results {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .type-picker {
      display: grid;
      gap: 18px;
      padding: 16px;
      position: sticky;
      top: 16px;
    }

    .result-header h2 {
      font-size: 1rem;
      line-height: 1.2;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef2f7;
    }

    .tab {
      min-height: 40px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
    }

    .tab:hover {
      transform: none;
      box-shadow: none;
      color: var(--ink);
    }

    .tab.active {
      border-color: var(--line);
      background: #fff;
      color: var(--ink);
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
    }

    .tab-panel[hidden] {
      display: none;
    }

    .search-box {
      width: 100%;
      min-height: 42px;
      margin-bottom: 10px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: 700 0.92rem/1 system-ui, sans-serif;
    }

    .search-box:focus {
      border-color: var(--focus);
      outline: 3px solid rgba(37, 99, 235, 0.2);
    }

    .pokemon-list {
      display: grid;
      gap: 7px;
      max-height: 430px;
      overflow: auto;
      padding-right: 3px;
    }

    .pokemon-result {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 46px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      box-shadow: none;
    }

    .pokemon-result:hover {
      transform: none;
      border-color: #b7c2d2;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
    }

    .pokemon-result.active {
      border-color: #111827;
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.16);
    }

    .pokemon-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .pokemon-types {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 5px;
    }

    .mini-chip {
      min-height: 22px;
      padding: 0 8px;
      font-size: 0.68rem;
    }

    .type-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: #fff;
      font: 750 0.88rem/1 system-ui, sans-serif;
      letter-spacing: 0;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.14);
    }

    button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.32);
      outline-offset: 2px;
    }

    button.active {
      border-color: #111827;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.72), 0 10px 20px rgba(15, 23, 42, 0.2);
    }

    .results {
      min-height: 480px;
      padding: 18px;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .result-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .pokemon-image {
      width: 112px;
      height: 112px;
      object-fit: contain;
      image-rendering: auto;
      flex: 0 0 auto;
    }

    .pokemon-image[hidden] {
      display: none;
    }

    .selected-type {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      color: #fff;
      font-weight: 800;
      font-size: 0.9rem;
    }

    .empty-badge {
      background: #8f99a5;
    }

    .matchups {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .group {
      min-height: 162px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .group h3 {
      margin: 0 0 10px;
      font-size: 0.92rem;
      line-height: 1.25;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border: 2px solid transparent;
      border-radius: 999px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 800;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.24);
    }

    .chip-label {
      position: relative;
      z-index: 1;
    }

    .chip-super {
      border-color: #fff !important;
      outline: 2px solid var(--chip-color);
      outline-offset: 1px;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.18);
    }

    .chip-weak {
      border-color: #fff !important;
      border-style: dashed;
    }

    .chip-normal {
      border-color: transparent !important;
    }

    .chip-none {
      border-color: transparent !important;
      overflow: hidden;
      background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.7) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.7) 75%);
      background-size: 2px 2px;
    }

    .empty {
      color: var(--muted);
      font-size: 0.88rem;
    }

    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 22px, 640px);
        padding: 24px 0;
      }

      .app,
      .matchups {
        grid-template-columns: 1fr;
      }

      .type-picker {
        position: static;
      }
    }
  </style>
</head>

  <main>
    <header>
      <h1>Pokemon Type Lookup</h1>
      <p>Pick an attack move type to see what it hits, or pick a Pokemon type to find which move types work best against it.</p>
    </header>

    <section class="app" aria-label="Pokemon type matchup lookup">
      <aside class="type-picker" aria-label="Type lookup controls">
        <div class="tabs" role="tablist" aria-label="Lookup mode">
          <button class="tab active" type="button" id="pokemonTab" role="tab" aria-selected="true" aria-controls="pokemonPanel" data-tab="pokemon">
            Pokemon type
          </button>
          <button class="tab" type="button" id="attackTab" role="tab" aria-selected="false" aria-controls="attackPanel" data-tab="attack">
            Attack moves
          </button>
          <button class="tab" type="button" id="searchTab" role="tab" aria-selected="false" aria-controls="searchPanel" data-tab="search">
            Search pokemon
          </button>
        </div>

        <div class="tab-panel" id="pokemonPanel" role="tabpanel" aria-labelledby="pokemonTab">
          <div class="type-grid" id="pokemonButtons"></div>
        </div>

        <div class="tab-panel" id="searchPanel" role="tabpanel" aria-labelledby="searchTab" hidden>
          <input class="search-box" id="pokemonSearch" type="search" autocomplete="off" placeholder="Search Pokemon">
          <div class="pokemon-list" id="pokemonResults"></div>
        </div>

        <div class="tab-panel" id="attackPanel" role="tabpanel" aria-labelledby="attackTab" hidden>
          <div class="type-grid" id="attackButtons"></div>
        </div>
      </aside>

      <section class="results" aria-live="polite">
        <div class="result-header">
          <div class="result-summary">
            <img class="pokemon-image" id="pokemonImage" alt="" hidden>
            <h2 id="resultTitle">Select a type</h2>
          </div>
          <span class="selected-type empty-badge" id="selectedBadge">None</span>
        </div>
        <div class="matchups" id="matchups"></div>
      </section>
    </section>

    <footer>Type chart data follows Bulbapedia's Generation VI onward table. Pokemon list sourced from PokemonDB.</footer>
  </main>

      attack: [
        { key: "super", title: "Strong against", test: value => value === 2 },
        { key: "weak", title: "Weak against", test: value => value === .5 },
        { key: "normal", title: "Normal", test: value => value === 1 },
        { key: "none", title: "Doesn't affect", test: value => value === 0 }
      ],
      pokemon: [
        { key: "super", title: "Strong moves", test: value => value === 2 },
        { key: "weak", title: "Weak move types", test: value => value === .5 },
        { key: "normal", title: "Normal damage moves", test: value => value === 1 },
        { key: "none", title: "No effect moves", test: value => value === 0 }
      ]
    };

    const attackButtons = document.querySelector("#attackButtons");
    const pokemonButtons = document.querySelector("#pokemonButtons");
    const pokemonSearch = document.querySelector("#pokemonSearch");
    const pokemonResults = document.querySelector("#pokemonResults");
    const matchups = document.querySelector("#matchups");
    const resultTitle = document.querySelector("#resultTitle");
    const selectedBadge = document.querySelector("#selectedBadge");
    const pokemonImage = document.querySelector("#pokemonImage");
    const selections = {
      attack: "",
      pokemon: "",
      search: null
    };
    let activeMode = "pokemon";

    function effectClass(value) {
      if (value > 1) return "chip-super";
      if (value > 0 && value < 1) return "chip-weak";
      if (value === 0) return "chip-none";
      return "chip-normal";
    }

    function typeChip(type, suffix = "", value = 1) {
      return `<span class="chip ${effectClass(value)}" style="--chip-color:${colors[type]}; background-color:${colors[type]}; border-color:${colors[type]}"><span class="chip-label">${type}${suffix}</span></span>`;
    }

    function multiplierLabel(value, showAll = false) {
      if (value === 4) return " x4";
      if (value === 2) return " x2";
      if (value === 1 && showAll) return " x1";
      if (value === .5) return " x0.5";
      if (value === .25) return " x0.25";
      if (value === 0) return " x0";
      return "";
    }

    function miniTypeChip(type) {
      return `<span class="chip mini-chip" style="background:${colors[type]}">${type}</span>`;
    }

    function buttonMarkup(mode) {
      return types.map(type => `
        <button type="button" style="background:${colors[type]}" data-mode="${mode}" data-type="${type}" aria-pressed="false">
          ${type}
        </button>
      `).join("");
    }

    function getMatchupValues(mode, type) {
      if (mode === "attack") {
        return chart[type].map((value, index) => ({ type: types[index], value }));
      }

      const defendingIndex = types.indexOf(type);
      return types.map(attackType => ({ type: attackType, value: chart[attackType][defendingIndex] }));
    }

    function getPokemonMatchupValues(defendingTypes) {
      const defendingIndexes = defendingTypes.map(type => types.indexOf(type));
      return types.map(attackType => {
        const value = defendingIndexes.reduce((total, defendingIndex) => {
          return total * chart[attackType][defendingIndex];
        }, 1);

        return { type: attackType, value };
      });
    }

    function setActiveMode(mode) {
      activeMode = mode;

      document.querySelectorAll(".tab").forEach(tab => {
        const isActive = tab.dataset.tab === mode;
        tab.classList.toggle("active", isActive);
        tab.setAttribute("aria-selected", isActive);
      });

      document.querySelectorAll(".tab-panel").forEach(panel => {
        panel.hidden = panel.id !== `${mode}Panel`;
      });
    }

    function renderEmpty(mode) {
      setActiveMode(mode);
      resultTitle.textContent = "Select a type";
      selectedBadge.textContent = "None";
      selectedBadge.removeAttribute("style");
      selectedBadge.classList.add("empty-badge");
      pokemonImage.hidden = true;
      pokemonImage.removeAttribute("src");
      pokemonImage.removeAttribute("alt");
      matchups.innerHTML = "";

      document.querySelectorAll(".type-grid button, .pokemon-result").forEach(button => {
        button.classList.remove("active");
        button.setAttribute("aria-pressed", "false");
      });
    }

    function renderGroups(mode, type) {
      selections[mode] = type;

      if (!type) {
        renderEmpty(mode);
        return;
      }

      setActiveMode(mode);

      const values = getMatchupValues(mode, type);
      const title = mode === "attack"
        ? `${type} attack move matchups`
        : `Moves against ${type} Pokemon`;

      resultTitle.textContent = title;
      selectedBadge.textContent = type;
      selectedBadge.style.background = colors[type];
      selectedBadge.classList.remove("empty-badge");
      pokemonImage.hidden = true;
      pokemonImage.removeAttribute("src");
      pokemonImage.removeAttribute("alt");

      matchups.innerHTML = labelSets[mode].map(group => {
        const matches = values.filter(matchup => group.test(matchup.value));
        const content = matches.length
          ? matches.map(matchup => typeChip(matchup.type, multiplierLabel(matchup.value), matchup.value)).join("")
          : '<span class="empty">None</span>';

        return `
          <article class="group">
            <h3>${group.title}</h3>
            <div class="chips">${content}</div>
          </article>
        `;
      }).join("");

      document.querySelectorAll(".type-grid button").forEach(button => {
        const isActive = button.dataset.mode === mode && button.dataset.type === type;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", isActive);
      });
    }

    function renderPokemon(pokemonEntry) {
      selections.search = pokemonEntry;
      setActiveMode("search");

      resultTitle.textContent = `Moves against ${pokemonEntry.name}`;
      selectedBadge.textContent = pokemonEntry.types.join(" / ");
      selectedBadge.style.background = colors[pokemonEntry.types[0]];
      selectedBadge.classList.remove("empty-badge");
      pokemonImage.src = pokemonEntry.img;
      pokemonImage.alt = pokemonEntry.name;
      pokemonImage.hidden = !pokemonEntry.img;

      const pokemonLabels = [
        { title: "Strong moves against", test: value => value > 1 },
        { title: "Weak moves against", test: value => value > 0 && value < 1 },
        { title: "Normal moves against", test: value => value === 1 },
        { title: "No effect moves against", test: value => value === 0 }
      ];

      const values = getPokemonMatchupValues(pokemonEntry.types);
      matchups.innerHTML = pokemonLabels.map(group => {
        const matches = values.filter(matchup => group.test(matchup.value));
        const content = matches.length
          ? matches.map(matchup => typeChip(matchup.type, multiplierLabel(matchup.value, true), matchup.value)).join("")
          : '<span class="empty">None</span>';

        return `
          <article class="group">
            <h3>${group.title}</h3>
            <div class="chips">${content}</div>
          </article>
        `;
      }).join("");

      document.querySelectorAll(".pokemon-result").forEach(button => {
        const isActive = Number(button.dataset.index) === pokemon.indexOf(pokemonEntry);
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", isActive);
      });

      document.querySelectorAll(".type-grid button").forEach(button => {
        button.classList.remove("active");
        button.setAttribute("aria-pressed", "false");
      });
    }

    function renderPokemonResults(query = "") {
      const normalized = query.trim().toLowerCase();
      const matches = pokemon
        .map((entry, index) => ({ ...entry, index }))
        .filter(entry => !normalized || entry.name.toLowerCase().includes(normalized));

      pokemonResults.innerHTML = matches.map(entry => `
        <button class="pokemon-result" type="button" data-index="${entry.index}" aria-pressed="false">
          <span class="pokemon-name">#${String(entry.n).padStart(4, "0")} ${entry.name}</span>
          <span class="pokemon-types">${entry.types.map(miniTypeChip).join("")}</span>
        </button>
      `).join("");
    }

    attackButtons.innerHTML = buttonMarkup("attack");
    pokemonButtons.innerHTML = buttonMarkup("pokemon");
    renderPokemonResults();

    document.querySelector(".type-picker").addEventListener("click", event => {
      const tab = event.target.closest(".tab[data-tab]");
      if (tab) {
        const mode = tab.dataset.tab;
        if (mode === "search") {
          selections.search ? renderPokemon(selections.search) : renderEmpty("search");
        } else {
          renderGroups(mode, selections[mode]);
        }
        return;
      }

      const pokemonButton = event.target.closest(".pokemon-result[data-index]");
      if (pokemonButton) {
        renderPokemon(pokemon[Number(pokemonButton.dataset.index)]);
        return;
      }

      const button = event.target.closest("button[data-type]");
      if (button) renderGroups(button.dataset.mode, button.dataset.type);
    });

    pokemonSearch.addEventListener("input", event => {
      renderPokemonResults(event.target.value);
    });

    pokemonImage.addEventListener("error", () => {
      pokemonImage.hidden = true;
    });

    renderGroups("pokemon", "");
  </script>
</body>
</html>
